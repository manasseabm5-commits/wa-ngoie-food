{% extends 'base.html' %}
{% block content %}
<div class="auth-box">
    <h2 class="auth-title">Connexion</h2>
    <p class="auth-subtitle">Connectez-vous pour commander vos plats ou ouvrir le panneau de gestion.</p>
    
    <form action="{{ url_for('login') }}" method="POST" class="auth-form">
        <div class="form-group">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="Ex: admin ou votre nom" required autocomplete="username" autocapitalize="none" autocorrect="off" class="form-input">
        </div>
        
        <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password" class="form-input">
        </div>
        
        <button type="submit" class="btn-submit">
             Entrer dans l'application
        </button>
    </form>
    
    <p class="auth-footer-text">
        Nouveau ici ? <a href="{{ url_for('register') }}" class="auth-link">Créez un compte ici</a>
    </p>
</div>
{% endblock %}
