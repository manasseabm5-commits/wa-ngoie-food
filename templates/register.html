<!-- templates/register.html -->
{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 420px; margin: 40px auto; padding: 25px; background: rgba(30,30,32,0.85); border-radius:12px; box-sizing: border-box;">
    <h2 style="color: #d4af37; text-align: center; margin-bottom: 15px; text-transform: uppercase; font-size: 20px; letter-spacing: 0.5px;">
        Créer un compte Client
    </h2>
    <p class="menu-intro" style="text-align: center; font-size: 13px; line-height: 1.5; margin-bottom: 25px;">
        Votre numéro de téléphone est indispensable pour permettre le suivi logistique de votre commande à Kintambo.
    </p>
    
    <form action="{{ url_for('register') }}" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
        <div>
            <label style="display: block; margin-bottom: 6px; font-size: 14px; color: #c4c7c5; font-weight: 500;">Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="Ex: Manassé" required autocomplete="username" autocapitalize="none" autocorrect="off"
                   style="width: 100%; box-sizing: border-box; background: #1e1e20; border: 1px solid #2f2f32; color: #fff; padding: 12px 16px; border-radius: 8px; outline: none; font-size: 14px; transition: border-color 0.2s;">
        </div>
        
        <div>
            <label style="display: block; margin-bottom: 2px; font-size: 14px; color: #c4c7c5; font-weight: 500;">Numéro WhatsApp Officiel</label>
            <span style="display: block; font-size: 11px; color: #747775; margin-bottom: 6px;">Saisir sans l'indicatif pays +243</span>
            <input type="tel" name="phone" placeholder="Ex: 0831674115" pattern="[0-9]*" inputmode="numeric" required autocomplete="tel"
                   style="width: 100%; box-sizing: border-box; background: #1e1e20; border: 1px solid #2f2f32; color: #fff; padding: 12px 16px; border-radius: 8px; outline: none; font-size: 14px;">
        </div>
        
        <div>
            <label style="display: block; margin-bottom: 6px; font-size: 14px; color: #c4c7c5; font-weight: 500;">Mot de passe</label>
            <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password"
                   style="width: 100%; box-sizing: border-box; background: #1e1e20; border: 1px solid #2f2f32; color: #fff; padding: 12px 16px; border-radius: 8px; outline: none; font-size: 14px;">
        </div>

        <div style="display: flex; align-items: center; gap: 12px; background: rgba(30,30,32,0.6); padding: 12px; border-radius: 8px; border: 1px solid #2f2f32; margin-top: 5px;">
            <input type="checkbox" id="is_student_isipa" name="is_student_isipa" style="width: 20px; height: 20px; cursor: pointer; accent-color: #d4af37; flex-shrink: 0;">
            <label for="is_student_isipa" style="font-size: 13px; color: #38bdf8; cursor: pointer; user-select: none; font-weight: 600; line-height: 1.3;">
                🎓 Je suis étudiant à l'ISIPA Kintambo
            </label>
        </div>
        
        <button type="submit" class="cta-btn" style="margin-top: 10px; padding: 14px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; width: 100%;">
            🚀 Valider mon inscription
        </button>
    </form>
    
    <p style="text-align: center; font-size: 13px; color: #c4c7c5; margin-top: 20px; margin-bottom: 0;">
        Déjà inscrit ? <a href="{{ url_for('login') }}" style="color: #d4af37; text-decoration: none; font-weight: bold;">Connectez-vous ici</a>
    </p>
</div>
{% endblock %}
