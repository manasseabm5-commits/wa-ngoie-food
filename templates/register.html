{% extends 'base.html' %}
{% block content %}
<div class="auth-box">
    <h2 class="auth-title">Créer un compte</h2>
    <p class="auth-subtitle">Votre numéro de téléphone nous permet de vous contacter pour le suivi de votre commande.</p>
    
    <form action="{{ url_for('register') }}" method="POST" class="auth-form">
        <div class="form-group">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="Ex: Manassé" required autocomplete="username" autocapitalize="none" autocorrect="off" class="form-input">
        </div>
        
        <div class="form-group">
            <label class="form-label">Numéro WhatsApp</label>
            <span class="form-hint">Écrire le numéro complet sans le signe + (Ex: 0831674115)</span>
            <input type="tel" name="phone" placeholder="Ex: 0831674115" pattern="[0-9]*" inputmode="numeric" required autocomplete="tel" class="form-input">
        </div>
        
        <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password" class="form-input">
        </div>
        
        <button type="submit" class="btn-submit">
            ✨ Valider mon inscription
        </button>
    </form>
    
    <p class="auth-footer-text">
        Déjà un compte ? <a href="{{ url_for('login') }}" class="auth-link">Connectez-vous ici</a>
    </p>
</div>
{% endblock %}
